name: Build scrcpy (Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - forward-client-microphone
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk \
            meson \
            ninja-build \
            pkg-config \
            mingw-w64 \
            mingw-w64-tools \
            libz-mingw-w64-dev \
            libavformat-dev \
            libavcodec-dev \
            libavutil-dev \
            libswresample-dev \
            libavdevice-dev \
            zip \
            unzip \
            curl \
            wget \
            python3
            
      - name: Show repository structure
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Make release script executable
        run: chmod +x release/build_windows.sh

      - name: Build
        run: ./release/build_windows.sh 64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-release
          path: dist/**
